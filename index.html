<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        
        /* Markdown-like simple formatting */
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden font-sans selection:bg-blue-500 selection:text-white">

    <aside class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col transition-all duration-300 hidden md:flex" id="sidebar">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Nexus AI</h1>
            <button id="mobile-menu-close" class="md:hidden text-gray-400 hover:text-white">✕</button>
        </div>
        
        <div class="p-4">
            <button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition-colors font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-2" id="chat-history-list">
            </div>

        <div class="p-4 border-t border-gray-800">
            <button id="open-settings-btn" class="w-full flex items-center gap-2 text-gray-400 hover:text-white transition-colors p-2 rounded hover:bg-gray-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="md:hidden flex items-center justify-between p-4 border-b border-gray-800 bg-gray-950">
            <button id="mobile-menu-open" class="text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-lg font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Nexus AI</h1>
            <div class="w-6"></div> </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 flex flex-col">
            <div id="empty-state" class="m-auto text-center max-w-md">
                <div class="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-semibold mb-2 text-gray-200">How can I help you today?</h2>
                <p class="text-gray-400">Please ensure your OpenRouter API key is configured in the settings.</p>
            </div>
            </div>

        <div class="p-4 md:p-6 bg-gray-900 border-t border-gray-800">
            <div class="max-w-4xl mx-auto relative">
                <textarea id="message-input" rows="1" class="w-full bg-gray-800 border border-gray-700 rounded-xl pl-4 pr-14 py-3 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none overflow-hidden block" placeholder="Message AI... (Shift+Enter for new line)" style="min-height: 52px; max-height: 200px;"></textarea>
                <button id="send-btn" class="absolute right-2 bottom-2 p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <div class="text-center mt-2">
                <span class="text-xs text-gray-500">AI can make mistakes. Verify important information.</span>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden backdrop-blur-sm">
        <div class="bg-gray-900 border border-gray-800 rounded-xl w-full max-w-md p-6 shadow-2xl mx-4">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-800 pb-2">Configuration</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="sk-or-v1-...">
                    <p class="text-xs text-gray-500 mt-1">Stored securely in your browser's local storage.</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="e.g., google/gemini-2.5-pro">
                    <p class="text-xs text-gray-500 mt-1">Find models at <a href="https://openrouter.ai/docs/models" target="_blank" class="text-blue-400 hover:underline">OpenRouter Docs</a>.</p>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button id="close-settings-btn" class="px-4 py-2 text-gray-300 hover:text-white transition-colors">Cancel</button>
                <button id="save-settings-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const STATE = {
            chats: JSON.parse(localStorage.getItem('chats')) || [],
            currentChatId: null,
            settings: JSON.parse(localStorage.getItem('ai_settings')) || {
                apiKey: '',
                model: 'google/gemini-2.5-pro'
            },
            isGenerating: false
        };

        // --- DOM Elements ---
        const elements = {
            sidebar: document.getElementById('sidebar'),
            chatHistoryList: document.getElementById('chat-history-list'),
            chatContainer: document.getElementById('chat-container'),
            emptyState: document.getElementById('empty-state'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            
            // Modal Elements
            settingsModal: document.getElementById('settings-modal'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            
            // Buttons
            newChatBtn: document.getElementById('new-chat-btn'),
            openSettingsBtn: document.getElementById('open-settings-btn'),
            closeSettingsBtn: document.getElementById('close-settings-btn'),
            saveSettingsBtn: document.getElementById('save-settings-btn'),
            mobileMenuOpen: document.getElementById('mobile-menu-open'),
            mobileMenuClose: document.getElementById('mobile-menu-close')
        };

        // --- Initialization ---
        function init() {
            if (STATE.chats.length > 0) {
                selectChat(STATE.chats[0].id);
            } else {
                createNewChat();
            }
            renderSidebar();
            setupEventListeners();
        }

        // --- Core Logic ---
        function saveState() {
            localStorage.setItem('chats', JSON.stringify(STATE.chats));
            localStorage.setItem('ai_settings', JSON.stringify(STATE.settings));
        }

        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Conversation',
                messages: [],
                createdAt: new Date().toISOString()
            };
            STATE.chats.unshift(newChat);
            STATE.currentChatId = newChat.id;
            saveState();
            renderSidebar();
            renderChat();
            elements.messageInput.focus();
        }

        function selectChat(id) {
            STATE.currentChatId = id;
            renderSidebar();
            renderChat();
            if(window.innerWidth < 768) toggleMobileSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            STATE.chats = STATE.chats.filter(c => c.id !== id);
            if (STATE.currentChatId === id) {
                STATE.currentChatId = STATE.chats.length > 0 ? STATE.chats[0].id : null;
                if (!STATE.currentChatId) createNewChat();
            }
            saveState();
            renderSidebar();
            renderChat();
        }

        function getCurrentChat() {
            return STATE.chats.find(c => c.id === STATE.currentChatId);
        }

        // --- UI Rendering ---
        function renderSidebar() {
            elements.chatHistoryList.innerHTML = '';
            STATE.chats.forEach(chat => {
                const isActive = chat.id === STATE.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}`;
                div.onclick = () => selectChat(chat.id);
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate text-sm font-medium flex-1';
                titleSpan.textContent = chat.title;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = `text-gray-500 hover:text-red-400 ml-2 ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity`;
                deleteBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                deleteBtn.onclick = (e) => deleteChat(chat.id, e);

                div.appendChild(titleSpan);
                div.appendChild(deleteBtn);
                elements.chatHistoryList.appendChild(div);
            });
        }

        function renderChat() {
            const chat = getCurrentChat();
            
            // Clean container except empty state
            Array.from(elements.chatContainer.children).forEach(child => {
                if (child.id !== 'empty-state') child.remove();
            });

            if (!chat || chat.messages.length === 0) {
                elements.emptyState.style.display = 'block';
                return;
            }

            elements.emptyState.style.display = 'none';

            chat.messages.forEach(msg => {
                appendMessageToUI(msg.role, msg.content);
            });
            scrollToBottom();
        }

        function appendMessageToUI(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 max-w-4xl mx-auto w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            bubble.className = `px-5 py-3.5 rounded-2xl max-w-[85%] message-content shadow-sm border ${
                role === 'user' 
                ? 'bg-gray-800 border-gray-700 text-white rounded-br-none' 
                : 'bg-transparent border-transparent text-gray-100'
            }`;

            if (role === 'assistant') {
                const iconDiv = document.createElement('div');
                iconDiv.className = 'w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center shrink-0 mt-1';
                iconDiv.innerHTML = '<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';
                wrapper.appendChild(iconDiv);
            }

            bubble.textContent = content; // Using textContent protects against XSS
            wrapper.appendChild(bubble);

            if (role === 'user') {
                const iconDiv = document.createElement('div');
                iconDiv.className = 'w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center shrink-0 mt-1';
                iconDiv.innerHTML = '<svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>';
                wrapper.appendChild(iconDiv);
            }

            elements.chatContainer.appendChild(wrapper);
            scrollToBottom();
            return bubble;
        }

        function scrollToBottom() {
            elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
        }

        function toggleLoading(isLoading) {
            STATE.isGenerating = isLoading;
            elements.sendBtn.disabled = isLoading;
            elements.messageInput.disabled = isLoading;
            
            if (isLoading) {
                elements.sendBtn.innerHTML = '<svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            } else {
                elements.sendBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>';
                elements.messageInput.focus();
            }
        }

        // --- API Interaction ---
        async function handleSend() {
            if (STATE.isGenerating) return;
            
            const content = elements.messageInput.value.trim();
            if (!content) return;

            if (!STATE.settings.apiKey) {
                alert("Please configure your OpenRouter API key in settings first.");
                openSettings();
                return;
            }

            const chat = getCurrentChat();
            
            // Generate title based on first message
            if (chat.messages.length === 0) {
                chat.title = content.length > 30 ? content.substring(0, 30) + '...' : content;
                elements.emptyState.style.display = 'none';
                renderSidebar();
            }

            // Update state & UI
            chat.messages.push({ role: 'user', content });
            elements.messageInput.value = '';
            elements.messageInput.style.height = 'auto'; // reset textarea
            saveState();
            appendMessageToUI('user', content);
            
            toggleLoading(true);

            // Create loading bubble
            const loadingBubble = appendMessageToUI('assistant', 'Thinking...');
            loadingBubble.classList.add('animate-pulse', 'text-gray-400');

            try {
                // Map local message format to API format
                const apiMessages = chat.messages.map(m => ({
                    role: m.role,
                    content: m.content
                }));

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${STATE.settings.apiKey}`,
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Universal AI Chat",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: STATE.settings.model,
                        messages: apiMessages
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP Error ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Update UI and state
                loadingBubble.classList.remove('animate-pulse', 'text-gray-400');
                loadingBubble.textContent = aiResponse;
                
                chat.messages.push({ role: 'assistant', content: aiResponse });
                saveState();

            } catch (error) {
                console.error("API Error:", error);
                loadingBubble.classList.remove('animate-pulse');
                loadingBubble.classList.add('text-red-400');
                loadingBubble.textContent = `Error: ${error.message}`;
            } finally {
                toggleLoading(false);
            }
        }

        // --- Settings Modal Logic ---
        function openSettings() {
            elements.apiKeyInput.value = STATE.settings.apiKey;
            elements.modelInput.value = STATE.settings.model;
            elements.settingsModal.classList.remove('hidden');
        }

        function closeSettings() {
            elements.settingsModal.classList.add('hidden');
        }

        function saveSettings() {
            STATE.settings.apiKey = elements.apiKeyInput.value.trim();
            const newModel = elements.modelInput.value.trim();
            STATE.settings.model = newModel || 'google/gemini-2.5-pro';
            saveState();
            closeSettings();
        }

        // --- Mobile Sidebar Logic ---
        function toggleMobileSidebar() {
            elements.sidebar.classList.toggle('hidden');
            elements.sidebar.classList.toggle('absolute');
            elements.sidebar.classList.toggle('z-40');
            elements.sidebar.classList.toggle('h-full');
        }

        // --- Event Listeners Setup ---
        function setupEventListeners() {
            // Chat Input Auto-resize
            elements.messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Keyboard Shortcuts
            elements.messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // Buttons
            elements.sendBtn.addEventListener('click', handleSend);
            elements.newChatBtn.addEventListener('click', createNewChat);
            
            // Settings
            elements.openSettingsBtn.addEventListener('click', openSettings);
            elements.closeSettingsBtn.addEventListener('click', closeSettings);
            elements.saveSettingsBtn.addEventListener('click', saveSettings);
            
            // Close modal on outside click
            elements.settingsModal.addEventListener('click', (e) => {
                if (e.target === elements.settingsModal) closeSettings();
            });

            // Mobile Menu
            elements.mobileMenuOpen.addEventListener('click', toggleMobileSidebar);
            elements.mobileMenuClose.addEventListener('click', toggleMobileSidebar);
        }

        // Boot up
        init();
    </script>
</body>
</html>
